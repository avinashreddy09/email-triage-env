[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "email-triage-env"
version = "1.0.0"
description = "Real-world email management simulation for AI agents"
authors = [
    {name = "Avinash Reddy", email = "avinashreddydonthireddy2006@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0.0",
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0"
]

[project.urls]
Homepage = "https://github.com/avinashreddy09/email-triage-agent"
"Hugging Face" = "https://huggingface.co/spaces/avinashreddy09/email-triage-agent"

[tool.setuptools.packages.find]
where = ["."]
include = ["environment*"]

[tool.setuptools.package-data]
environment = ["*.yaml"]
